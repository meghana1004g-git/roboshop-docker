services:
  catalogue: 
    build:
      context: ./catalogue
      dockerfile: Dockerfile 
    image: meghanai/catalogue:1.0.0 
    container_name: catalogue
    depends_on:
    - mongodb
    
  user: 
    build:
      context: ./user
      dockerfile: Dockerfile   
    image: meghanai/user:1.0.0
    container_name: user
    depends_on:
    - redis   

  cart: 
    build:
      context: ./cart
      dockerfile: Dockerfile   
    image: meghanai/cart:1.0.0
    container_name: cart
    depends_on:
    - redis   

  shipping:
     build:
      context: ./shipping
      dockerfile: Dockerfile   
     image: meghanai/shipping:1.0.0
     container_name: shipping
     depends_on:
     - mysql   
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile   
    image: meghanai/frontend:1.0.0
    container_name: frontend
    ports: 
    - "80:80"
    depends_on:
    - catalogue
    - user   
    - cart
    - shipping
 

  mongodb:
    build: 
      context: ./mongodb
      dockerfile: Dockerfile
    image: meghanai/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis 

  mysql:
    build: 
      context: ./mysql
    image: meghanai/mysql:1.0.0   
    container_name: mysql

  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq    

networks:
  default:
    driver: bridge
    name: roboshop
    external: true