services:
  catalogue: 
    build:
      dockerfile: catalogue.Dockerfile 
    image: meghana1004g/catalogue:1.0.0 
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb:
    build: 
      dockerfile: mongodb.Dockerfile # it moves to mongodb directory
    image: meghana1004g/mongodb:1.0.0 #docker build -t meghana1004g/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
